defaults:
  - ppo_trainer
  - _self_

ttrl:
  # Whether to enable TTRL, refer to (https://arxiv.org/abs/2504.16084)
  enable: false

  # Number of rollouts per prompt, used for actual training
  n_samples_per_prompt: ${actor_rollout_ref.rollout.n}

  # Number of rollouts per prompt, used for label voting
  n_votes_per_prompt: ${actor_rollout_ref.rollout.n}

  # Multiple-attempts sampling (Algorithm 1 from TTRL paper).
  # When all G training samples are identical (advantage collapse),
  # fall back to the next group of G samples from the vote pool.
  multi_attempt_sampling:
    enable: false
    max_attempts: 3

algorithm:
  # Confidence-weighted advantage (TTRL paper Eq. 5).
  # Scales GRPO advantage by f(Conf), where Conf is majority_ratio
  # (MCQ: vote fraction, open-ended: medoid similarity).
  confidence_weighted_advantage:
    enable: false