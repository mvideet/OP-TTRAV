### model
model_name_or_path: /data/sls/scratch/mvideet/models/Qwen2.5-Omni-3B
trust_remote_code: true
use_audio_in_video: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all

### dataset
dataset: omnivideo_oneshot_sft
template: qwen2_omni
cutoff_len: 10000
max_samples: 100000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /data/sls/scratch/mvideet/TTRL/sft_checkpoints/oneshot_sft
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: wandb

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
eval_dataset: omnivideo_eval
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 10
predict_with_generate: true
compute_mcq_accuracy: true
